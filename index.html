<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css">
    <title>Clicker</title>
  </head>
  <body>
    <h1>Generic Clicker Game</h1>
    <div class="counter" id="counter">Loading...</div>
    <button onclick="add()" type="button" class="button">CLICK ME</button>

    <button type="button" class="button" id="settings" style="top:6%; left: 90%; right:auto; padding: 7px 11px;--button-color:blue;--button-bg:azure;">Settings</button>

    <div id="settingsModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <span class="close">&times;</span>
        </div>

        <div class="modal-section">
          <div class="modal-section-label">Reset Progress</div>
          <div class="modal-section-body">
            <p class="modal-description">This will permanently erase all of your progress. This action cannot be undone.</p>
            <button onclick="reset()" type="button" class="modal-btn modal-btn--danger">Reset Game</button>
          </div>
        </div>
      </div>
    </div>

    <button onclick="save()" type="button" class="button" style="top:6%; left:8%; right:auto; padding: 7px 11px;--button-color:orange;--button-bg:lightyellow;">Save</button>
    <p class="informer">Progress saved!</p>

    <p class="auto-save" style="right:auto;left:3%;">Game auto-saves every 10 seconds</p>
    <p class="auto-save" style="left: auto; right: 3%;">Made by <a href="chadwickbroski.github.io" style="color:#002CF2;">ChadwickBroski</a>.</p>

    <script src="script.js"></script>
  </body>
</html>
